<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color · AI Identity</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #FBF9F4; font-family: var(--font-ui); }
  h4 { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: #8A8175; font-weight: 600; margin: 0 0 12px; }
  .lead { font-size: 12px; color: #524A41; margin-bottom: 14px; line-height: 165%; max-width: 600px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; gap: 5px; align-items: center; }
  .chip {
    width: 56px; height: 56px; border-radius: 50%;
    display: grid; place-items: center;
    color: #FFF; font-weight: 700; font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .name { font-size: 11px; color: #29251F; font-weight: 600; font-family: var(--font-ui); }
  .hex { font-size: 9px; font-family: var(--font-mono); color: #8A8175; }
</style>
<script src="../assets/sc-ui.js" defer></script>
</head>
<body>
  <h4>AI / Agent identity hues</h4>
  <div class="lead">Each AI model gets a stable hue so the user can visually track its opinions across the comparison board.</div>
  <div class="row">
    <div class="sw"><div class="chip" data-model-icon="openai"></div><div class="name">GPT-4o</div><div class="hex">#4A6FA5</div></div>
    <div class="sw"><div class="chip" data-model-icon="claude"></div><div class="name">Claude</div><div class="hex">#7B5EA0</div></div>
    <div class="sw"><div class="chip" data-model-icon="gemini"></div><div class="name">Gemini</div><div class="hex">#C68635</div></div>
    <div class="sw"><div class="chip" data-model-icon="perplexity"></div><div class="name">Perplexity</div><div class="hex">#3D8077</div></div>
    <div class="sw"><div class="chip" data-model-icon="grok"></div><div class="name">Grok</div><div class="hex">#B05C6D</div></div>
    <div class="sw"><div class="chip" data-model-icon="deepseek"></div><div class="name">DeepSeek</div><div class="hex">#5E6B7D</div></div>
  </div>
</body>
</html>
