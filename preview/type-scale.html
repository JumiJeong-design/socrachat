<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Type · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 28px; background: #FBF9F4; color: #29251F; font-family: var(--font-jp); }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 5px 0; border-bottom: 1px dashed #E8DECE; vertical-align: baseline; }
  td:first-child { width: 70px; font-family: var(--font-mono); font-size: 10px; color: #8A8175; }
  td:nth-child(2) { width: 110px; font-family: var(--font-mono); font-size: 10px; color: #524A41; }
  tr:last-child td { border: 0; }
</style>
</head>
<body>
  <table>
    <tr><td>64px</td><td>--text-5xl · hero</td><td style="font-family:'Shippori Mincho',serif;font-size:64px;font-weight:500;line-height: 100%">問いを、深く。</td></tr>
    <tr><td>48px</td><td>--text-4xl · h1</td><td style="font-size:48px;font-weight:600;line-height: 110%;font-family:'Inter',sans-serif">Hero answer 答え</td></tr>
    <tr><td>36px</td><td>--text-3xl · h2</td><td style="font-size:36px;font-weight:600;line-height: 115%">セクション見出し</td></tr>
    <tr><td>28px</td><td>--text-2xl · h3</td><td style="font-size:28px;font-weight:600;line-height: 120%">中見出し</td></tr>
    <tr><td>22px</td><td>--text-xl · h4</td><td style="font-size:22px;font-weight:600">小見出し</td></tr>
    <tr><td>18px</td><td>--text-lg</td><td style="font-size:18px">本文ラージ Body lg</td></tr>
    <tr><td>14.5px</td><td>--text-base</td><td style="font-size:14.5px">本文ベース · デフォルト Body base default</td></tr>
    <tr><td>13px</td><td>--text-sm</td><td style="font-size:13px;color:#524A41">補足 · ラベル Label / muted</td></tr>
    <tr><td>12px</td><td>--text-xs</td><td style="font-size:12px;color:#8A8175;letter-spacing:.04em;text-transform:uppercase;font-weight:600">CAPTION · キャプション</td></tr>
  </table>
</body>
</html>
