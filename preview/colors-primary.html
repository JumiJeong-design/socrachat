<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color · Primary (Forest)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #FBF9F4; font-family: var(--font-ui); }
  h4 { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: #8A8175; font-weight: 600; margin: 0 0 12px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .sw { display: flex; flex-direction: column; gap: 5px; }
  .chip { aspect-ratio: 1.3/1; border-radius: 10px; border: 1px solid rgba(0,0,0,.04); }
  .name { font-size: 11px; color: #524A41; font-weight: 500; }
  .hex { font-size: 10px; font-family: var(--font-mono); color: #8A8175; }
  .marker { box-shadow: 0 0 0 2px #2D5F4F; }
</style>
</head>
<body>
  <h4>Forest — primary · trustworthy advisor</h4>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E8EFEA"></div><div class="name">forest-50</div><div class="hex">#E8EFEA</div></div>
    <div class="sw"><div class="chip" style="background:#C8D6CC"></div><div class="name">forest-100</div><div class="hex">#C8D6CC</div></div>
    <div class="sw"><div class="chip" style="background:#9FB7AA"></div><div class="name">forest-200</div><div class="hex">#9FB7AA</div></div>
    <div class="sw"><div class="chip" style="background:#6E8B7A"></div><div class="name">forest-300</div><div class="hex">#6E8B7A</div></div>
    <div class="sw"><div class="chip marker" style="background:#2D5F4F"></div><div class="name" style="color:#234A3F;font-weight:600">forest-500 ●</div><div class="hex">#2D5F4F</div></div>
    <div class="sw"><div class="chip" style="background:#234A3F"></div><div class="name">forest-600</div><div class="hex">#234A3F</div></div>
    <div class="sw"><div class="chip" style="background:#1A372E"></div><div class="name">forest-700</div><div class="hex">#1A372E</div></div>
  </div>
</body>
</html>
