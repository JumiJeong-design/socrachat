<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Agreement Viz · 4 styles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 22px; background: #FBF9F4; font-family: var(--font-ui); color: #29251F; }
  h4 { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: #8A8175; font-weight: 600; margin: 0 0 10px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .panel { background: #FFF; border: 1px solid #E8DECE; border-radius: 14px; padding: 14px 14px 12px; display: flex; flex-direction: column; gap: 10px; }
  .ptitle { font-size: 11px; font-weight: 600; color: #524A41; display: flex; align-items: center; gap: 6px; }
  .ptitle .num { font-family: var(--font-mono); color: #8A8175; }

  /* 1. Stacked bar */
  .bar { display: flex; height: 24px; border-radius: 6px; overflow: hidden; }
  .bar > div { display: grid; place-items: center; color: #FFF; font-family: var(--font-mono); font-size: 10px; font-weight: 600; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 10px; color: #524A41; }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .legend i { width: 8px; height: 8px; border-radius: 2px; }

  /* 2. Donut */
  .donut-wrap { display: flex; align-items: center; gap: 12px; }
  .donut {
    width: 80px; height: 80px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(#7B5EA0 0% 38%, #4A6FA5 38% 64%, #C68635 64% 80%, #3D8077 80% 100%);
    position: relative;
  }
  .donut::after { content: ''; position: absolute; inset: 18px; border-radius: 50%; background: #FFF; }
  .donut-center { position: absolute; inset: 0; display: grid; place-items: center; z-index: 1; font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: #29251F; }
  .donut-legend { display: flex; flex-direction: column; gap: 3px; font-size: 11px; }
  .donut-legend .ll { display: flex; align-items: center; gap: 6px; }
  .donut-legend .ll i { width: 8px; height: 8px; border-radius: 2px; }

  /* 3. Dot matrix */
  .dots { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
  .dots i { aspect-ratio: 1; border-radius: 3px; }

  /* 4. Horizontal bars per AI */
  .bars-list { display: flex; flex-direction: column; gap: 5px; font-size: 11px; }
  .blrow { display: grid; grid-template-columns: 70px 1fr 32px; gap: 8px; align-items: center; }
  .blrow .lb { font-weight: 600; color: #29251F; }
  .blrow .track { height: 8px; background: #F5F1EA; border-radius: 4px; overflow: hidden; }
  .blrow .fill { height: 100%; border-radius: 4px; }
  .blrow .pc { font-family: var(--font-mono); color: #524A41; text-align: right; font-size: 10px; }
</style>
</head>
<body>
  <div class="grid">

    <div class="panel">
      <div class="ptitle"><span class="num">①</span> Stacked bar · 가중치 한눈에</div>
      <div class="bar">
        <div style="background:#7B5EA0;width:38%">38%</div>
        <div style="background:#4A6FA5;width:26%">26%</div>
        <div style="background:#C68635;width:18%">18%</div>
        <div style="background:#3D8077;width:18%">18%</div>
      </div>
      <div class="legend">
        <span><i style="background:#7B5EA0"></i>結論 A</span>
        <span><i style="background:#4A6FA5"></i>結論 B</span>
        <span><i style="background:#C68635"></i>条件付き</span>
        <span><i style="background:#3D8077"></i>その他</span>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle"><span class="num">②</span> Donut · 가장 균형 잡힌</div>
      <div class="donut-wrap">
        <div style="position:relative;width:80px;height:80px;">
          <div class="donut"></div>
          <div class="donut-center">73%</div>
        </div>
        <div class="donut-legend">
          <div class="ll"><i style="background:#7B5EA0"></i>結論 A (38%)</div>
          <div class="ll"><i style="background:#4A6FA5"></i>結論 B (26%)</div>
          <div class="ll"><i style="background:#C68635"></i>条件付き (18%)</div>
          <div class="ll"><i style="background:#3D8077"></i>その他 (18%)</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle"><span class="num">③</span> Dot matrix · 100명 비유</div>
      <div class="dots">
        <i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i>
        <i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#7B5EA0"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i>
        <i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i>
        <i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#4A6FA5"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i>
        <i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i><i style="background:#C68635"></i>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle"><span class="num">④</span> Per-AI bars · 각 모델 입장 추적</div>
      <div class="bars-list">
        <div class="blrow"><div class="lb">Claude</div><div class="track"><div class="fill" style="width:95%;background:#7B5EA0"></div></div><div class="pc">95</div></div>
        <div class="blrow"><div class="lb">GPT-4o</div><div class="track"><div class="fill" style="width:80%;background:#4A6FA5"></div></div><div class="pc">80</div></div>
        <div class="blrow"><div class="lb">Gemini</div><div class="track"><div class="fill" style="width:55%;background:#C68635"></div></div><div class="pc">55</div></div>
        <div class="blrow"><div class="lb">Perplexity</div><div class="track"><div class="fill" style="width:42%;background:#3D8077"></div></div><div class="pc">42</div></div>
        <div class="blrow"><div class="lb">Grok</div><div class="track"><div class="fill" style="width:18%;background:#B05C6D"></div></div><div class="pc">18</div></div>
      </div>
    </div>

  </div>
</body>
</html>
