<!DOCTYPE html>
<html lang="ko" data-theme="light" data-lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SocraChat · Follow-up</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../apple-theme.css">
<link rel="stylesheet" href="../notion-theme.css">
<link rel="stylesheet" href="../components.css">
<script src="../assets/sc-ui.js" defer></script>
<script src="../assets/shell.js" defer></script>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  html, body { margin: 0; min-height: 100vh; }
  body { background: var(--bg); color: var(--fg); display: flex; flex-direction: column; }
  .topbar { padding: 18px 24px; display: flex; align-items: center; }

  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px 24px 80px; }
  .container { width: 100%; max-width: 660px; display: flex; flex-direction: column; gap: 24px; }

  /* eyebrow pill (larger than .badge — page-specific) */
  .eyebrow-pill {
    display: inline-flex; align-items: center; gap: 6px;
    align-self: flex-start;
    padding: 5px 14px; border-radius: var(--r-full);
    background: var(--warn-soft);
    color: var(--warm-accent);
    font-size: 11.5px; font-weight: 700; letter-spacing: .04em;
  }
  .eyebrow-pill svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }

  .lead h1 {
    font-size: 26px; font-weight: 600; line-height: 140%;
    color: var(--fg-strong); letter-spacing: -.005em;
  }
  .lead p { font-size: 14px; color: var(--fg-muted); margin-top: 10px; line-height: 165%; }

  /* QUESTION SECTION */
  .qsection { display: flex; flex-direction: column; gap: 14px; }
  .qtitle { font-size: 15.5px; font-weight: 600; color: var(--fg-strong); display: flex; align-items: center; gap: 8px; }
  .qtitle .num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); color: var(--accent-fg);
    display: grid; place-items: center;
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  }

  .options { display: grid; gap: 8px; }
  .opt {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    font-size: 14px; color: var(--fg-strong);
    cursor: pointer;
    transition: all var(--dur-base) var(--ease-out);
    text-align: left;
    font-family: inherit;
  }
  .opt:hover { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .opt.sel { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .opt .check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--line-strong);
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: var(--dur-base) var(--ease-out);
  }
  .opt.sel .check { border-color: var(--accent); background: var(--accent); }
  .opt.sel .check::after {
    content: ''; width: 6px; height: 10px; border: 1.5px solid var(--fg-on-accent);
    border-top: 0; border-left: 0;
    transform: rotate(45deg) translateY(-1px);
  }
  .opt .lbl { flex: 1; line-height: 165%; }
  .opt .cat-tag { margin-left: auto; }
  .opt.sel .cat-tag { background: var(--surface); color: var(--accent); }
  .opt.idk { color: var(--fg-subtle); font-style: italic; }

  .custom {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px dashed var(--line-strong);
    border-radius: var(--r-md);
  }
  .custom input {
    flex: 1; border: 0; outline: none;
    font-family: inherit; font-size: 14px; color: var(--fg);
    background: transparent;
  }
  .custom input::placeholder { color: var(--fg-subtle); }

  .footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 8px; }

  /* progress dots */
  .qrow { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); letter-spacing: .04em; }
  .prog-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line-strong); }
  .prog-dot.active { background: var(--accent); }
  .prog-dot.done { background: var(--accent); opacity: .4; }

  @media (max-width: 540px) {
    .topbar { padding: 12px 16px; }
    .main { padding: 20px 16px 72px; }
    .lead h1 { font-size: 22px; }
    .lead p { font-size: 13px; }
    .opt { padding: 11px 13px; font-size: 13.5px; }
    .opt .cat-tag { display: none; }
    .footer { flex-direction: column; align-items: stretch; gap: 8px; }
    .btn-primary { justify-content: center; height: 44px; }
    .btn-ghost { text-align: center; padding: 8px 0; }
  }
</style>
</head>
<body>

<header class="topbar"><div data-sc-logo="sm"></div></header>

<main class="main">
  <div class="container">

    <span class="eyebrow-pill">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v6M12 15v6M3 12h6M15 12h6"/></svg>
      <span data-i18n="badge">もう少し教えてください</span>
    </span>

    <div class="lead">
      <h1 data-i18n="lead_h1">「テスラ」が何を指しているか、ヒントをいただけますか？</h1>
      <p data-i18n="lead_p">質問の意図によって参照するモデルや答えの方向性が変わるため、いくつか確認させてください。 (2問・約15秒)</p>
    </div>

    <div class="qrow">
      <div class="prog-dot done"></div><div class="prog-dot active"></div><div class="prog-dot"></div>
      <span style="margin-left:6px" data-i18n="step_label">質問 2 / 3</span>
    </div>

    <div class="qsection">
      <div class="qtitle"><span class="num">1</span><span data-i18n="q1">「テスラ」とは、どちらを指していますか？</span></div>
      <div class="options">
        <button class="opt sel">
          <div class="check"></div>
          <div class="lbl" data-i18n="q1o1">テスラ社の <b>株式</b> (TSLA)</div>
          <span class="cat-tag" data-i18n="q1o1c">投資</span>
        </button>
        <button class="opt">
          <div class="check"></div>
          <div class="lbl" data-i18n="q1o2">テスラ社の <b>自動車</b> (購入検討)</div>
          <span class="cat-tag" data-i18n="q1o2c">消費</span>
        </button>
        <button class="opt">
          <div class="check"></div>
          <div class="lbl" data-i18n="q1o3"><b>イーロン・マスク</b> 関連のニュース</div>
          <span class="cat-tag" data-i18n="q1o3c">時事</span>
        </button>
        <button class="opt idk">
          <div class="check"></div>
          <div class="lbl" data-i18n="q1o4">よくわからない / その他</div>
        </button>
      </div>
    </div>

    <div class="qsection">
      <div class="qtitle"><span class="num">2</span><span data-i18n="q2">投資の経験は？ (複数選択可)</span></div>
      <div class="options">
        <button class="opt sel">
          <div class="check"></div>
          <div class="lbl" data-i18n="q2o1">NISA・iDeCo は使っている</div>
        </button>
        <button class="opt">
          <div class="check"></div>
          <div class="lbl" data-i18n="q2o2">個別株の売買経験あり</div>
        </button>
        <button class="opt">
          <div class="check"></div>
          <div class="lbl" data-i18n="q2o3">米国株は初めて</div>
        </button>
        <button class="opt">
          <div class="check"></div>
          <div class="lbl" data-i18n="q2o4">投資自体が初めて</div>
        </button>
      </div>
      <div class="custom">
        <span style="color:var(--fg-subtle);font-size:12px">▸</span>
        <input data-i18n="custom_input" data-i18n-attr="placeholder" placeholder="自由に入力する…">
      </div>
    </div>

    <div class="footer">
      <button class="btn btn-ghost btn-sm" data-i18n="skip">この質問はスキップ</button>
      <button class="btn btn-primary btn-md"><span data-i18n="continue">続ける</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
    </div>

  </div>
</main>

<script>
  // toggle select
  document.querySelectorAll('.opt').forEach(o => {
    o.addEventListener('click', () => o.classList.toggle('sel'));
  });

  };
</script>
</body>
</html>
