<!DOCTYPE html>
<html lang="ja" data-theme="light" data-lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SocraChat · Full Flow Walkthrough</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="apple-theme.css">
<script src="assets/sc-ui.js" defer></script>
<script src="assets/shell.js" defer></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100vh; overflow: hidden; }
  body {
    background: var(--bg-sunken);
    color: var(--fg);
    display: flex; flex-direction: column;
    font-family: var(--font-ui);
  }

  /* === TOP STEPPER === */
  .stepper-bar {
    flex-shrink: 0;
    padding: 14px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .mark {
    width: 28px; height: 28px; border-radius: 50%;
    background: conic-gradient(from -110deg at 50% 50%, var(--accent) 0deg, var(--accent) 220deg, transparent 220deg);
    position: relative;
  }
  .mark::after { content: ''; position: absolute; inset: 5px; border-radius: 50%; background: var(--bg); }
  .mark::before { content: ''; position: absolute; inset: 9px; border-radius: 50%; background: var(--accent); z-index: 1; }
  .brand .name { font-size: 14px; font-weight: 600; letter-spacing: -.01em; color: var(--fg-strong); }
  .brand .name .accent { color: var(--accent); }
  .brand .tag {
    font-family: var(--font-mono); font-size: 9px; padding: 2px 7px; border-radius: 4px;
    background: var(--accent-soft); color: var(--accent); font-weight: 700; letter-spacing: .05em;
    margin-left: 4px;
  }

  .stepper {
    flex: 1;
    display: flex; align-items: center;
    overflow-x: auto;
    padding: 4px 0;
    gap: 2px;
  }
  .stepper::-webkit-scrollbar { display: none; }

  .step {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-radius: 999px;
    background: transparent;
    border: 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px; font-weight: 500;
    color: var(--fg-muted);
    transition: all 180ms cubic-bezier(.2,.8,.2,1);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .step .num {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--bg-sunken);
    color: var(--fg-subtle);
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .step:hover { background: var(--surface-hover); color: var(--fg-strong); }
  .step.done .num { background: var(--accent-soft); color: var(--accent); }
  .step.done .num::after { content: '✓'; }
  .step.done .num .n { display: none; }
  .step.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }
  .step.active .num { background: var(--accent); color: var(--accent-fg); }

  .step-arrow {
    color: var(--line-strong);
    flex-shrink: 0;
    margin: 0 -2px;
  }
  .step-arrow svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* nav buttons */
  .navbtn {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    height: 32px; padding: 0 12px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 12px; font-weight: 600;
    color: var(--fg-muted); cursor: pointer;
    flex-shrink: 0;
  }
  .navbtn:hover { background: var(--surface-hover); color: var(--fg-strong); }
  .navbtn:disabled { opacity: .4; cursor: not-allowed; }
  .navbtn.primary { background: var(--accent); color: var(--accent-fg); border-color: transparent; }
  .navbtn.primary:hover { background: var(--accent-hover); }
  .navbtn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* === SCENE NARRATION === */
  .narration {
    flex-shrink: 0;
    padding: 14px 24px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    display: flex; gap: 16px; align-items: center;
  }
  .narration .step-meta {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--fg-subtle); font-weight: 700;
    width: 80px; flex-shrink: 0;
  }
  .narration .text {
    flex: 1;
    font-size: 13.5px; color: var(--fg); line-height: 165%;
  }
  .narration .text strong { color: var(--fg-strong); font-weight: 700; }
  .narration .text .kbd {
    display: inline-block; padding: 1px 6px; font-family: var(--font-mono); font-size: 11px;
    background: var(--bg-sunken); border: 1px solid var(--line); border-radius: 4px;
    color: var(--fg-muted);
  }

  .chrome-divider { width: 1px; height: 20px; background: var(--line); flex-shrink: 0; }

  /* === STAGE === */
  .stage {
    flex: 1;
    overflow: auto;
    position: relative;
    background: var(--bg-sunken);
    display: flex; align-items: stretch; justify-content: center;
  }
  .stage iframe {
    width: 100%; height: 100%; border: 0;
    background: var(--bg);
    transition: opacity 240ms cubic-bezier(.2,.8,.2,1);
  }
  .stage.transition iframe { opacity: 0; }

  /* mobile viewport */
  body[data-vp="mobile"] .stage {
    padding: 20px 16px 40px;
    align-items: flex-start;
    overflow-y: auto;
  }
  body[data-vp="mobile"] .device {
    width: 390px;
    height: 844px;
    max-height: calc(100vh - 60px);
    min-height: 600px;
    background: var(--surface);
    border-radius: 32px;
    padding: 0;
    box-shadow:
      0 0 0 1px var(--line),
      0 0 0 8px var(--bg),
      0 0 0 9px var(--line-strong),
      0 24px 60px -16px rgba(45, 35, 20, 0.25);
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  body[data-vp="mobile"] .device::before { display: none; }
  body[data-vp="mobile"] iframe {
    width: 100%; height: 100%;
    border-radius: 32px;
    display: block;
  }
  body[data-vp="desktop"] .device {
    width: 100%; height: 100%; padding: 0;
    background: transparent; box-shadow: none;
    overflow: visible; border-radius: 0;
  }
  body[data-vp="desktop"] .device::before { display: none; }
  body[data-vp="desktop"] iframe { border-radius: 0; }

  /* helper hint for mobile view */
  .vp-hint {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    font-family: var(--font-mono); font-size: 9px; letter-spacing: .15em;
    color: var(--fg-subtle); text-transform: uppercase; font-weight: 700;
    pointer-events: none;
    opacity: 0;
  }
  body[data-vp="mobile"] .vp-hint { opacity: 1; }

  /* === BOTTOM FAB-style nav for mobile === */
  @media (max-width: 768px) {
    .stepper-bar { flex-wrap: wrap; gap: 10px; padding: 10px 14px; }
    .narration .step-meta { display: none; }
    .narration { padding: 10px 14px; font-size: 12px; }
    .step { font-size: 11px; padding: 5px 9px; }
  }

  /* === COLLAPSIBLE CHROME === */
  .chrome-wrap {
    overflow: hidden;
    max-height: 200px;
    transition: max-height 300ms cubic-bezier(.4,0,.2,1);
  }
  body.chrome-collapsed .chrome-wrap {
    max-height: 0;
  }

  .chrome-toggle {
    background: none; border: 0; cursor: pointer;
    color: var(--fg-subtle); padding: 4px 6px;
    border-radius: 6px; flex-shrink: 0;
    display: inline-flex; align-items: center;
    transition: all 150ms;
  }
  .chrome-toggle:hover { color: var(--fg-strong); background: var(--surface-hover); }
  .chrome-toggle svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 300ms cubic-bezier(.4,0,.2,1); }
  body.chrome-collapsed .chrome-toggle svg { transform: rotate(180deg); }

  .chrome-peek {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    z-index: 100;
    background: var(--bg);
    border: 1px solid var(--line);
    border-top: 0;
    border-radius: 0 0 12px 12px;
    padding: 3px 14px 5px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: .06em;
    color: var(--fg-muted); cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    opacity: 0; pointer-events: none;
    transition: opacity 200ms;
  }
  body.chrome-collapsed .chrome-peek { opacity: 1; pointer-events: all; }
  .chrome-peek:hover { color: var(--accent); }
  .chrome-peek svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<!-- PEEK TAB (shows when chrome is collapsed) -->
<button class="chrome-peek" id="chrome-peek" title="툴바 펼치기">
  <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
  FLOW
</button>

<div class="chrome-wrap">
<!-- TOP STEPPER -->
<header class="stepper-bar">
  <div class="brand">
    <div class="mark"></div>
    <span class="name">Socra<span class="accent">Chat</span></span>
    <span class="tag" data-i18n="flow_tag">FLOW</span>
  </div>

  <div class="stepper" id="stepper"></div>
  <div class="chrome-divider"></div>
  <button class="navbtn" id="prev-btn">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span data-i18n="prev">前へ</span>
  </button>
  <button class="navbtn primary" id="next-btn">
    <span data-i18n="next">次へ</span>
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
  </button>
</header>

<!-- NARRATION -->
<div class="narration">
  <div class="step-meta" id="step-meta">STEP 1 / 6</div>
  <div class="text" id="narration-text"></div>
  <button class="chrome-toggle" id="chrome-toggle" title="툴바 접기">
    <svg viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
  </button>
</div>
</div><!-- /chrome-wrap -->

<!-- STAGE -->
<main class="stage" id="stage">
  <div class="device">
    <iframe id="screen" src="screens/home.html" data-sc-embed></iframe>
  </div>
</main>

<script>
  // === Chrome collapse toggle ===
  const chromeToggle = document.getElementById('chrome-toggle');
  const chromePeek   = document.getElementById('chrome-peek');
  function toggleChrome() {
    document.body.classList.toggle('chrome-collapsed');
    localStorage.setItem('flow-chrome-collapsed', document.body.classList.contains('chrome-collapsed') ? '1' : '');
  }
  chromeToggle.addEventListener('click', toggleChrome);
  chromePeek.addEventListener('click', toggleChrome);
  if (localStorage.getItem('flow-chrome-collapsed')) document.body.classList.add('chrome-collapsed');

  // === Flow definition ===
  const STEPS = [
    {
      id: 'home',
      path: 'screens/home.html',
      label: { ja: 'ホーム', en: 'Home', ko: '홈' },
      narration: {
        ja: 'ユーザーは気になる問いを書き、<strong>5つのAIモデル</strong>を選んで送信。質問例や履歴も表示。',
        en: 'User writes a question, picks <strong>5 AI models</strong>, hits send. Suggestions + recent history shown.',
        ko: '사용자가 궁금한 질문을 작성하고 <strong>5개 AI 모델</strong>을 선택해 전송. 추천 질문 + 최근 히스토리 표시.',
      }
    },
    {
      id: 'followup',
      path: 'screens/followup.html',
      label: { ja: '追加質問', en: 'Clarify', ko: '추가 질문' },
      narration: {
        ja: '質問の意図が曖昧な場合 ("テスラ" = 株 / 車 / 人?)、<strong>選択型で軽く聞き返す</strong>。直接入力 + スキップも可能。',
        en: 'If intent is unclear ("Tesla" = stock / car / person?), <strong>ask back with multi-choice</strong>. Custom input + skip available.',
        ko: '질문 의도가 모호하면 ("테슬라" = 주식 / 차 / 인물?), <strong>선택형으로 가볍게 되묻기</strong>. 직접 입력 + 건너뛰기 가능.',
      }
    },
    {
      id: 'analyzing',
      path: 'screens/analyzing.html',
      label: { ja: '分析中', en: 'Analyzing', ko: '분석 중' },
      narration: {
        ja: '<strong>カテゴリ分類 → モデル選定 → 並列問い合わせ → 結論クラスタリング → ペルソナ生成 → 出典確認</strong> の6段階パイプライン。いつでも中断可能。',
        en: '<strong>Categorize → select models → parallel query → cluster conclusions → generate personas → verify sources</strong>. 6-step pipeline, cancellable.',
        ko: '<strong>카테고리 분류 → 모델 선정 → 병렬 질의 → 결론 클러스터링 → 페르소나 생성 → 출처 확인</strong>의 6단계 파이프라인. 언제든 중단 가능.',
      }
    },
    {
      id: 'comparison',
      path: 'screens/comparison.html',
      label: { ja: '比較ボード', en: 'Compare', ko: '비교 보드' },
      narration: {
        ja: '🌟 <strong>メイン画面</strong>。5モデルの意見分布を <strong>4つの可視化</strong> から選択 (バー / ドーナツ / ドット / モデル別)。結論カード A / B + ペルソナ視点 + 出典 + 高リスク警告。',
        en: '🌟 <strong>The hero screen</strong>. 5-model distribution in <strong>4 togglable viz</strong> (bar / donut / dots / per-AI). Conclusion cards A/B + persona side + sources + high-risk warnings.',
        ko: '🌟 <strong>메인 화면</strong>. 5개 모델 의견 분포를 <strong>4가지 시각화</strong>로 선택 (바 / 도넛 / 도트 / 모델별). 결론 카드 A/B + 페르소나 사이드 + 출처 + 고위험 경고.',
      }
    },
    {
      id: 'source',
      path: 'screens/source.html',
      label: { ja: '原文 (詳細)', en: 'Source', ko: '원문 상세' },
      narration: {
        ja: '比較ボードから「<strong>原文を見る</strong>」で遷移。特定モデルの回答全文 + メタ情報 (生成時間・トークン・確信度) + 引用源リスト。サイドで他モデルへ即切替。',
        en: 'From the board, click "<strong>View source</strong>" to land here. Full text from one model + metadata (gen time, tokens, confidence) + citations. Switch to other models in the side panel.',
        ko: '비교 보드에서 "<strong>원문 보기</strong>"로 이동. 특정 모델의 답변 전문 + 메타 정보 (생성 시간·토큰·확신도) + 인용 출처. 사이드에서 다른 모델로 즉시 전환.',
      }
    },
    {
      id: 'deepchat',
      path: 'screens/deep-chat.html',
      label: { ja: '1:1 深掘り', en: 'Deep Chat', ko: '심층 대화' },
      narration: {
        ja: '気になるAI (例: Claude) を選び、<strong>1対1で深掘り対話</strong>。比較ボードの結論を文脈として引き継ぐので、続きから自然に話せる。',
        en: 'Pick the AI that interests you (e.g. Claude) and have a <strong>1-on-1 deep conversation</strong>. The earlier consensus carries over as context so the dialogue picks up naturally.',
        ko: '관심 있는 AI (예: Claude)를 선택해 <strong>1:1로 심층 대화</strong>. 비교 보드의 결론을 맥락으로 인계받아 자연스럽게 이어집니다.',
      }
    },
  ];

  let currentIdx = 0;
  const stepperEl = document.getElementById('stepper');
  const screenEl = document.getElementById('screen');
  const stageEl = document.getElementById('stage');
  const metaEl = document.getElementById('step-meta');
  const narrationEl = document.getElementById('narration-text');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');

  function lang() { return localStorage.getItem('sc-lang') || 'ja'; }

  function renderStepper() {
    const L = lang();
    stepperEl.innerHTML = '';
    STEPS.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'step';
      if (i < currentIdx) btn.classList.add('done');
      if (i === currentIdx) btn.classList.add('active');
      btn.innerHTML = `<span class="num"><span class="n">${i + 1}</span></span><span>${s.label[L]}</span>`;
      btn.addEventListener('click', () => goTo(i));
      stepperEl.appendChild(btn);
      if (i < STEPS.length - 1) {
        const arrow = document.createElement('span');
        arrow.className = 'step-arrow';
        arrow.innerHTML = '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
        stepperEl.appendChild(arrow);
      }
    });
  }

  function renderMeta() {
    const L = lang();
    const labels = { ja: `ステップ ${currentIdx + 1} / ${STEPS.length}`, en: `STEP ${currentIdx + 1} / ${STEPS.length}`, ko: `${currentIdx + 1} / ${STEPS.length} 단계` };
    metaEl.textContent = labels[L];
    narrationEl.innerHTML = STEPS[currentIdx].narration[L];
    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = currentIdx === STEPS.length - 1;
    const nextLabels = { ja: currentIdx === STEPS.length - 1 ? '完了' : '次へ', en: currentIdx === STEPS.length - 1 ? 'Done' : 'Next', ko: currentIdx === STEPS.length - 1 ? '완료' : '다음' };
    const prevLabels = { ja: '前へ', en: 'Back', ko: '이전' };
    nextBtn.querySelector('span').textContent = nextLabels[L];
    prevBtn.querySelector('span').textContent = prevLabels[L];
  }

  function goTo(i) {
    if (i < 0 || i >= STEPS.length) return;
    currentIdx = i;
    stageEl.classList.add('transition');
    setTimeout(() => {
      screenEl.src = STEPS[i].path;
      stageEl.classList.remove('transition');
    }, 220);
    renderStepper();
    renderMeta();
    history.replaceState(null, '', '#' + STEPS[i].id);
  }

  function next() { if (currentIdx < STEPS.length - 1) goTo(currentIdx + 1); }
  function prev() { if (currentIdx > 0) goTo(currentIdx - 1); }

  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);

  function syncIframe() {
    try {
      const w = screenEl.contentWindow;
      if (w && w.__SC) {
        const lng = localStorage.getItem('sc-lang')   || 'ja';
        const thm = localStorage.getItem('sc-theme')  || 'light';
        const dsg = localStorage.getItem('sc-design') || 'sc';
        w.__SC.applyLang(lng);
        w.__SC.applyTheme(thm);
        w.__SC.applyDesign(dsg);
      }
    } catch (e) {}
  }

  // Propagate shell.js state changes into the iframe
  document.addEventListener('sc:lang',   () => { renderStepper(); renderMeta(); syncIframe(); });
  document.addEventListener('sc:theme',  syncIframe);
  document.addEventListener('sc:design', syncIframe);

  // Sync into iframe whenever a new screen loads
  screenEl.addEventListener('load', syncIframe);

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft') prev();
  });

  // Restore from hash on load
  const hash = (location.hash || '').replace('#', '');
  const startIdx = STEPS.findIndex(s => s.id === hash);
  if (startIdx >= 0) currentIdx = startIdx;

  // Initial render (shell.js handles data-lang / data-theme on html element)
  renderStepper();
  renderMeta();
  if (startIdx >= 0) screenEl.src = STEPS[startIdx].path;
</script>
</body>
</html>
